ai_usage_summary: |
  Used ChatGPT/Codex for validation support.
  The final ranker is deterministic and does not call any AI service during ranking.

methodology_summary: |
  Deterministic feature-engineered ranker for the Senior AI Engineer JD. The model
  combines production search/retrieval/ranking evidence, senior hands-on ML career
  fit, product shipping signals, logistics, education/open-source validation, and
  Redrob behavioral availability signals. Explicit penalties reduce keyword-stuffed
  non-AI profiles, services-only backgrounds, stale candidates, poor availability,
  and impossible-looking skill claims. The ranking step is standard-library Python,
  CPU-only, streaming JSONL, and network-free.

